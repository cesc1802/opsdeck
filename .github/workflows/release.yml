name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag commit is on master
        run: |
          git fetch origin master
          TAG_COMMIT="$(git rev-parse "${GITHUB_REF_NAME}^{commit}")"
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/master; then
            echo "::error::Tag ${GITHUB_REF_NAME} points to ${TAG_COMMIT}, which is not on master. Releases are cut from master only."
            exit 1
          fi
      - name: Verify tag matches app version
        run: |
          APP_VERSION="$(jq -r .version src-tauri/tauri.conf.json)"
          if [ "${GITHUB_REF_NAME}" != "v${APP_VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match src-tauri/tauri.conf.json version v${APP_VERSION}. Bump the app version or re-tag."
            exit 1
          fi

  create-release:
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases" \
            -f tag_name="${GITHUB_REF_NAME}" \
            -f name="OpsDeck ${GITHUB_REF_NAME}" \
            -F draft=true \
            -F generate_release_notes=true \
            --jq .id)"
          echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: create-release
    uses: ./.github/workflows/build-linux.yml
    with:
      release_id: ${{ needs.create-release.outputs.release_id }}
    secrets: inherit

  build-macos:
    needs: create-release
    uses: ./.github/workflows/build-macos.yml
    with:
      release_id: ${{ needs.create-release.outputs.release_id }}
    secrets: inherit

  build-windows:
    needs: create-release
    uses: ./.github/workflows/build-windows.yml
    with:
      release_id: ${{ needs.create-release.outputs.release_id }}
    secrets: inherit

  publish-release:
    needs: [create-release, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${{ needs.create-release.outputs.release_id }}" \
            -F draft=false

  cleanup-on-failure:
    if: failure() && needs.create-release.result == 'success'
    needs: [create-release, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Delete draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${{ needs.create-release.outputs.release_id }}"; then
            echo "::warning::Failed to delete draft release ${{ needs.create-release.outputs.release_id }}; remove it manually on GitHub before retrying."
          fi
